events {}

http {
    upstream app_servers {
        server web-app:8080;
    }

    server {
        listen 80;

        # Main application proxy
        location / {
            proxy_pass http://app_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Nginx status metrics for Prometheus exporter
        location /stub_status {
            stub_status;
            # Restrict access to localhost or the exporter's IP context.
            # In Docker compose, we allow all for simplicity in this demo,
            # but ideally restrict it to internal network.
            allow all;
        }
    }
}
